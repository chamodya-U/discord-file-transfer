<div class="page">
  <h1>Upload</h1>

  <div class="card">
    <label>Select File</label>
    <input
      type="text"
      id="selectedFile"
      placeholder="No file selected"
      readonly
    />

    <button id="browseButton">Browse...</button>

    <button id="uploadButton">Upload</button>
  </div>

  <div class="card">
    <progress id="uploadProgress" value="0" max="100"></progress>
    <p id="status">Ready</p>
  </div>
</div>
